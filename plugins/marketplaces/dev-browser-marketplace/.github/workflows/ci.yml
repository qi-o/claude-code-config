name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-daemon:
    name: Build Daemon Bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd daemon && pnpm install
      - run: cd daemon && pnpm run bundle
      - run: cd daemon && pnpm run bundle:sandbox-client
      - uses: actions/upload-artifact@v4
        with:
          name: daemon-bundles
          path: |
            daemon/dist/daemon.bundle.mjs
            daemon/dist/sandbox-client.js

  format:
    name: Format Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd daemon && pnpm install
      - run: cd daemon && pnpm run format:check
      - uses: dtolnay/rust-toolchain@stable
      - run: cd cli && cargo fmt -- --check

  daemon-tests:
    name: Daemon (TypeScript + Tests)
    needs: build-daemon
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: daemon-bundles
          path: daemon/dist/
      - run: cd daemon && pnpm install
      - run: cd daemon && pnpm exec tsc --noEmit
      - run: cd daemon && pnpm exec playwright install chromium
      - run: cd daemon && pnpm vitest run

  cli:
    name: CLI (Rust)
    needs: build-daemon
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: daemon-bundles
          path: daemon/dist/
      - uses: dtolnay/rust-toolchain@stable
      - run: cd cli && cargo build
      - run: cd cli && cargo check
